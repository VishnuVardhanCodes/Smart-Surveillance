<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEye AI | Daily Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar same as dashboard -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-eye-slash"></i>
                <span>SmartEye AI</span>
            </div>
            <nav>
                <a href="/" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/history" class="nav-link">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="/humans" class="nav-link">
                    <i class="fas fa-user-friends"></i>
                    <span>Humans</span>
                </a>
                <a href="/bikes" class="nav-link">
                    <i class="fas fa-motorcycle"></i>
                    <span>Two-Wheelers</span>
                </a>
                <a href="/vehicles" class="nav-link">
                    <i class="fas fa-car-side"></i>
                    <span>Vehicles</span>
                </a>
                <a href="/reports" class="nav-link active">
                    <i class="fas fa-file-pdf"></i>
                    <span>Reports</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div style="display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 0.85rem;">
                    <div style="width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);"></div>
                    <span>System Active</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>Surveillance Reports</h1>
                <p>Automated daily analytics and activity summaries.</p>
            </header>

            <div class="card premium-card">
                <div class="card-header">
                    <h3><i class="fas fa-folder-open"></i> Generated Reports</h3>
                    <a href="/api/generate_report" class="btn btn-primary">
                        <i class="fas fa-sync-alt"></i> Generate Now
                    </a>
                </div>
                <div class="reports-grid">
                    {% for report in report_files %}
                    <div class="report-item">
                        <div class="report-icon"><i class="far fa-file-pdf"></i></div>
                        <div class="report-info">
                            <span class="report-name">{{ report }}</span>
                            <span class="report-date">{{ report.split('_')[-1].replace('.pdf', '') }}</span>
                        </div>
                        <a href="/reports/{{ report }}" class="download-link" download>
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
