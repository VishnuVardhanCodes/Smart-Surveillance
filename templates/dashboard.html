<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEye AI | Intelligent Surveillance</title>
    <!-- Favicon / Meta Tags for SEO -->
    <meta name="description" content="Advanced AI-powered surveillance dashboard for real-time object detection and tracking.">
    
    <!-- Poppins Font -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-eye-slash"></i>
                <span>SmartEye AI</span>
            </div>
            
            <nav>
                <a href="/" class="nav-link active">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/history" class="nav-link">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span>History</span>
                </a>
                <a href="/search" class="nav-link">
                    <i class="fas fa-magnifying-glass"></i>
                    <span>Search</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="status-card">
                    <div class="status-dot online"></div>
                    <span>System Active</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="animate-in" style="animation-delay: 0.1s;">
                <div class="header-info">
                    <h1>Surveillance Overview</h1>
                    <div class="date-time">
                        <span id="current-date">Saturday, April 18, 2026</span>
                        <span style="opacity: 0.3; margin: 0 10px;">|</span>
                        <span id="current-time">07:32:35 PM</span>
                    </div>
                    <div style="margin-top: 25px;">
                        <span style="background: #fee2e2; color: #dc2626; padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; letter-spacing: 1px;">● LIVE FEED</span>
                    </div>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-tiles">
                <div class="tile animate-in" style="animation-delay: 0.2s;">
                    <div class="tile-icon"><i class="fas fa-user-plus"></i></div>
                    <div class="tile-label">Total Entries</div>
                    <div class="tile-value" id="count-in">0</div>
                </div>
                <div class="tile animate-in" style="animation-delay: 0.3s;">
                    <div class="tile-icon"><i class="fas fa-user-minus"></i></div>
                    <div class="tile-label">Total Exits</div>
                    <div class="tile-value" id="count-out">0</div>
                </div>
                <div class="tile animate-in" style="animation-delay: 0.4s;">
                    <div class="tile-icon"><i class="fas fa-users"></i></div>
                    <div class="tile-label">Current Occupancy</div>
                    <div class="tile-value" id="occupancy">0</div>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="dashboard-grid">
                <!-- Video Section -->
                <div class="card animate-in" style="animation-delay: 0.5s;">
                    <div class="card-header">
                        <h3><i class="fas fa-video"></i> Principal Camera Stream</h3>
                        <div class="video-actions">
                            <i class="fas fa-expand-alt" style="cursor: pointer; opacity: 0.6;"></i>
                        </div>
                    </div>
                    <div class="video-frame">
                        <div class="scanner-line"></div>
                        <img src="{{ url_for('video_feed') }}" alt="Surveillance Feed">
                    </div>
                </div>

                <!-- Recent Events Sidebar -->
                <div class="card animate-in" style="animation-delay: 0.6s;">
                    <div class="card-header">
                        <h3><i class="fas fa-list-ul"></i> System Activity</h3>
                        <span class="date-time" style="font-size: 0.75rem;">Real-time</span>
                    </div>
                    <div class="logs-list" id="activity-logs">
                        <div class="log-entry" style="text-align: center; opacity: 0.5; padding: 2rem;">
                            Initializing smart detection modules...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- UI Logic Script -->
    <script>
        // Update stats from API
        async function fetchStats() {
            try {
                const response = await fetch('/api/counts');
                const data = await response.json();
                
                document.getElementById('count-in').innerText = data.in || 0;
                document.getElementById('count-out').innerText = data.out || 0;
                document.getElementById('occupancy').innerText = Math.max(0, (data.in || 0) - (data.out || 0));
            } catch (error) {
                console.error("Failed to fetch stats:", error);
            }
        }

        // Update detection logs
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const container = document.getElementById('logs-content');
                
                if (logs.length > 0) {
                    container.innerHTML = logs.map(log => {
                        // Clean up log string if it contains timestamps or specific patterns
                        const parts = log.split(' - ');
                        if (parts.length > 1) {
                            return `<div class="log-entry"><strong>${parts[0]}</strong> ${parts.slice(1).join(' - ')}</div>`;
                        }
                        return `<div class="log-entry">${log}</div>`;
                    }).join('');
                }
            } catch (error) {
                console.error("Failed to fetch logs:", error);
            }
        }

        // Clock functionality
        function updateClock() {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            const now = new Date().toLocaleDateString('en-US', options);
            document.getElementById('current-datetime').innerText = now;
        }

        // Polling intervals
        setInterval(fetchStats, 1000);
        setInterval(fetchLogs, 3000);
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
