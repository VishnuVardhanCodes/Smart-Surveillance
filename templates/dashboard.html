<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEye AI | Intelligent Surveillance</title>
    <!-- Favicon / Meta Tags for SEO -->
    <meta name="description" content="Advanced AI-powered surveillance dashboard for real-time object detection and tracking.">
    
    <!-- Poppins Font -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-eye-slash"></i>
                <span>SmartEye AI</span>
            </div>
            
            <nav>
                <a href="/" class="nav-link active">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/history" class="nav-link">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span>History</span>
                </a>
                <a href="/search" class="nav-link">
                    <i class="fas fa-magnifying-glass"></i>
                    <span>Search</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="status-card">
                    <div class="status-dot online"></div>
                    <span>System Active</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header>
                <div class="header-info">
                    <h1>Surveillance Overview</h1>
                    <div class="date-time" id="current-datetime">Loading session...</div>
                </div>
                <div class="badges">
                    <span class="badge live"><i class="fas fa-circle"></i> Live Feed</span>
                </div>
            </header>

            <!-- Real-time Stats Cards -->
            <div class="stats-tiles">
                <div class="tile">
                    <div class="tile-icon"><i class="fas fa-user-plus"></i></div>
                    <div class="tile-label">Total Entries</div>
                    <div class="tile-value" id="count-in">0</div>
                </div>
                <div class="tile">
                    <div class="tile-icon"><i class="fas fa-user-minus"></i></div>
                    <div class="tile-label">Total Exits</div>
                    <div class="tile-value" id="count-out">0</div>
                </div>
                <div class="tile">
                    <div class="tile-icon"><i class="fas fa-users"></i></div>
                    <div class="tile-label">Current Occupancy</div>
                    <div class="tile-value" id="occupancy">0</div>
                </div>
            </div>

            <!-- Dashboard Grid Layout -->
            <div class="dashboard-grid">
                <!-- Video Monitor Section -->
                <section class="card video-section">
                    <div class="card-header">
                        <h3><i class="fas fa-video"></i> Principal Camera Stream</h3>
                        <div class="card-actions">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    <div class="video-frame">
                        <img src="{{ url_for('video_feed') }}" alt="Surveillance Stream" onerror="this.src='https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop'">
                        <div class="video-overlay">
                            <div class="scanner-line"></div>
                        </div>
                    </div>
                </section>

                <!-- Activity Logging Section -->
                <section class="card logs-section">
                    <div class="card-header">
                        <h3><i class="fas fa-list-ul"></i> System Activity</h3>
                        <span class="text-med" style="font-size: 0.8rem;">Real-time</span>
                    </div>
                    <div class="logs-list" id="logs-content">
                        <!-- Dynamic Logs -->
                        <div class="log-entry">Initializing smart detection modules...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- UI Logic Script -->
    <script>
        // Update stats from API
        async function fetchStats() {
            try {
                const response = await fetch('/api/counts');
                const data = await response.json();
                
                document.getElementById('count-in').innerText = data.in || 0;
                document.getElementById('count-out').innerText = data.out || 0;
                document.getElementById('occupancy').innerText = Math.max(0, (data.in || 0) - (data.out || 0));
            } catch (error) {
                console.error("Failed to fetch stats:", error);
            }
        }

        // Update detection logs
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const container = document.getElementById('logs-content');
                
                if (logs.length > 0) {
                    container.innerHTML = logs.map(log => {
                        // Clean up log string if it contains timestamps or specific patterns
                        const parts = log.split(' - ');
                        if (parts.length > 1) {
                            return `<div class="log-entry"><strong>${parts[0]}</strong> ${parts.slice(1).join(' - ')}</div>`;
                        }
                        return `<div class="log-entry">${log}</div>`;
                    }).join('');
                }
            } catch (error) {
                console.error("Failed to fetch logs:", error);
            }
        }

        // Clock functionality
        function updateClock() {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            const now = new Date().toLocaleDateString('en-US', options);
            document.getElementById('current-datetime').innerText = now;
        }

        // Polling intervals
        setInterval(fetchStats, 1000);
        setInterval(fetchLogs, 3000);
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
